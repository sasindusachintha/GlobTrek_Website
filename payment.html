<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment | GlobeTrek</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-white sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <img src="images/logo.png" alt="GlobeTrek Logo" class="me-2 logo">
                GlobeTrek Adventures
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="packages.html">Packages</a></li>
                    <li class="nav-item"><a class="nav-link" href="booking.html">Booking</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html#about-us">About Us</a></li>
                    <li class="nav-item" id="authItem">
                        <a class="nav-link" href="login.html" id="authLink" data-auth-link>Sign in</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="page-layout">
        <div class="container">
            <div class="row g-4 align-items-start">
                <div class="col-xl-7">
                    <div class="payment-panel">
                        <h3 class="mb-4">Confirm and Pay</h3>
                        <form id="paymentForm">
                            <div class="mb-3">
                                <label class="form-label">Card number</label>
                                <input id="cardNumber" type="text" class="form-control form-control-lg" inputmode="numeric" autocomplete="cc-number" placeholder="1234 5678 9012 3456">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Card holder</label>
                                <input id="cardHolder" type="text" class="form-control form-control-lg" autocomplete="cc-name" placeholder="Full name on card">
                            </div>
                            <div class="row g-3">
                                <div class="col-md-8">
                                    <label class="form-label">Expiration date</label>
                                    <input id="cardExpiry" type="month" class="form-control form-control-lg" autocomplete="cc-exp">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">CVV</label>
                                    <input id="cardCvv" type="text" class="form-control form-control-lg" inputmode="numeric" autocomplete="cc-csc" placeholder="123">
                                </div>
                            </div>
                            <div id="paymentMessage" class="mt-3 text-danger"></div>
                            <button type="submit" class="btn btn-primary btn-lg mt-4 w-100">Confirm and pay</button>
                        </form>
                    </div>
                </div>
                <div class="col-xl-5">
                    <div class="summary-panel mb-4">
                        <div class="row g-3 align-items-center">
                            <div class="col-5">
                                <div class="about-image" style="min-height: 180px;">Package</div>
                            </div>
                            <div class="col-7">
                                <h4 id="paymentPackageName" class="mb-2">Santorini Breeze</h4>
                                <p id="paymentPackageSummary" class="text-muted mb-0">3 Days · Luxury transport · 4.8 rating</p>
                            </div>
                        </div>
                    </div>
                    <div class="payment-details">
                        <h5>Price Details</h5>
                        <div class="detail-row"><span>Base price</span><span id="paymentTotal">LKR 13,650</span></div>
                        <div class="detail-row"><span>Taxes & fees</span><span>LKR 1,200</span></div>
                        <div class="detail-row"><span>Service fee</span><span>LKR 450</span></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
