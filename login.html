<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | GlobeTrek</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-white sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <img src="images/logo.png" alt="GlobeTrek Logo" class="me-2 logo">
                GlobeTrek Adventures
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="packages.html">Packages</a></li>
                    <li class="nav-item"><a class="nav-link" href="booking.html">Booking</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="auth-page">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-xl-10">
                    <div class="row g-0 auth-card">
                        <div class="col-lg-6 auth-side p-5 d-flex flex-column justify-content-center">
                            <div>
                                <div class="d-flex align-items-center gap-2 mb-4">
                                    <span class="badge bg-white text-primary px-3 py-2 rounded-pill">GlobeTrek Adventures</span>
                                </div>
                                <h1 class="display-6 fw-bold">Welcome back</h1>
                                <p class="mt-4">Log in to manage your bookings, save favorite packages and explore exclusive travel offers.</p>
                            </div>
                        </div>
                        <div class="col-lg-6 page-form">
                            <h2>Login</h2>
                            <form id="loginForm">
                                <div class="mb-3">
                                    <input id="loginEmail" type="email" class="form-control form-control-lg" placeholder="Email">
                                </div>
                                <div class="mb-3">
                                    <input id="loginPassword" type="password" class="form-control form-control-lg" placeholder="Password">
                                </div>
                                <div id="loginMessage" class="mb-3 text-danger"></div>
                                <button type="submit" class="btn btn-primary btn-lg w-100">Login</button>
                                <p class="text-center text-muted mt-4">Don’t have an account? <a href="register.html">Register</a></p>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
